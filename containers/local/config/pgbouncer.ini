[databases]
liqi = host=postgres port=5432 dbname=liqi

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432
unix_socket_dir = /tmp
pidfile = /tmp/pgbouncer.pid
logfile =

pool_mode = transaction
max_client_conn = 120
default_pool_size = 10
max_db_connections = 40
reserve_pool_size = 0

server_connect_timeout = 5
server_login_retry = 3
server_idle_timeout = 120
server_lifetime = 600
client_login_timeout = 10
idle_transaction_timeout = 30
transaction_timeout = 60
query_timeout = 30

server_check_query = select 1
server_check_delay = 15
server_reset_query = DISCARD ALL
server_reset_query_always = 0

client_tls_sslmode = disable
server_tls_sslmode = disable

auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt
admin_users = liqi_monitor
stats_users = liqi_monitor

ignore_startup_parameters = extra_float_digits,options
application_name_add_host = 1
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

[users]
liqi_api = pool_size=20 max_user_connections=20 max_user_client_connections=48
liqi_worker = pool_size=10 max_user_connections=10 max_user_client_connections=32
liqi_realtime = pool_size=5 max_user_connections=5 max_user_client_connections=24
liqi_readonly = pool_size=3 max_user_connections=3 max_user_client_connections=8
liqi_monitor = pool_mode=session pool_size=2 max_user_connections=2 max_user_client_connections=4
