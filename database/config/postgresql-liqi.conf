# LIQI PostgreSQL 17 V0 include fragment.
# Host bootstrap supplies data_directory, log_directory and pgBackRest environment.
listen_addresses = ''
port = 5432
unix_socket_directories = '/run/postgresql'
password_encryption = 'scram-sha-256'

max_connections = 80
superuser_reserved_connections = 5
shared_buffers = '4GB'
effective_cache_size = '12GB'
work_mem = '8MB'
maintenance_work_mem = '512MB'
autovacuum_work_mem = '256MB'
huge_pages = try

wal_level = replica
archive_mode = on
archive_command = 'pgbackrest --stanza=liqi archive-push %p'
archive_timeout = '5min'
min_wal_size = '1GB'
max_wal_size = '8GB'
checkpoint_timeout = '15min'
checkpoint_completion_target = 0.9
wal_compression = on

track_io_timing = on
track_wal_io_timing = on
compute_query_id = auto

logging_collector = on
log_destination = 'jsonlog'
log_filename = 'postgresql-%Y-%m-%d.json'
log_rotation_age = '1d'
log_truncate_on_rotation = on
log_min_duration_statement = '1s'
log_statement = 'none'
log_parameter_max_length = 0
log_parameter_max_length_on_error = 0
log_connections = on
log_disconnections = on
log_lock_waits = on
log_checkpoints = on
log_autovacuum_min_duration = '5s'
deadlock_timeout = '1s'

statement_timeout = 0
lock_timeout = 0
idle_in_transaction_session_timeout = '60s'
idle_session_timeout = '30min'

shared_preload_libraries = ''
