[Service]
Slice=liqi-database.slice
ExecStart=
ExecStart=/usr/local/lib/liqi-database/database/bin/repository-check.sh
LoadCredential=pgbackrest-repo-ca:/run/liqi/secrets/database/pgbackrest-repo-ca
LoadCredential=pgbackrest-repo-client-cert:/run/liqi/secrets/database/pgbackrest-repo-client-cert
LoadCredential=pgbackrest-repo-client-key:/run/liqi/secrets/database/pgbackrest-repo-client-key
LoadCredential=pgbackrest-cipher-passphrase:/run/liqi/secrets/database/pgbackrest-cipher-passphrase
Environment=LIQI_PGBACKREST_COMMAND=/usr/local/lib/liqi-database/database/bin/pgbackrest-command.sh
ReadOnlyPaths=/usr/local/lib/liqi-database /run/liqi/management
ReadWritePaths=/var/lib/liqi/postgresql/backup-staging /var/log/liqi/postgresql /run/lock
