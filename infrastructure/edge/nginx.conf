user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /run/nginx/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
    multi_accept off;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format liqi '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" request_id=$request_id';
    access_log /var/log/nginx/access.log liqi;

    sendfile on;
    tcp_nopush on;
    server_tokens off;
    reset_timedout_connection on;

    keepalive_timeout 15s;
    keepalive_requests 100;
    client_header_timeout 10s;
    client_body_timeout 10s;
    send_timeout 15s;
    client_max_body_size 1m;
    large_client_header_buffers 4 8k;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream liqi_api {
        server 127.0.0.1:8080 max_fails=1 fail_timeout=5s;
        keepalive 8;
    }

    upstream liqi_realtime {
        server 127.0.0.1:8081 max_fails=1 fail_timeout=5s;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 444;
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;
        ssl_reject_handshake on;
    }

    include /etc/nginx/liqi-enabled/*.conf;
}
