name: V1 Source Integration Artifact Readiness

on:
  pull_request:
  push:
    branches:
      - main
      - "v1/**"

concurrency:
  group: v1-source-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  LIQI_EXPECTED_SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  LIQI_RELEASE_ID: liqi-v1-ci-${{ github.event.pull_request.head.sha || github.sha }}
  LIQI_FUZZ_TOOLCHAIN: nightly-2026-07-01
  CARGO_FUZZ_VERSION: "0.13.2"

jobs:
  source:
    name: Source contracts and security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.LIQI_EXPECTED_SOURCE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact source provenance
        run: >-
          python scripts/operations/verify_ci_provenance.py
          --job source
          --expected-sha "$LIQI_EXPECTED_SOURCE_SHA"
          --release-id "$LIQI_RELEASE_ID"
          --output .artifacts/v1/provenance/source.json

      - name: Configure BEAM toolchain when provider is integrated
        if: hashFiles('.tool-versions') != ''
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Fetch BEAM dependencies when provider is integrated
        if: hashFiles('mix.exs') != ''
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Configure Rust toolchain when provider is integrated
        if: hashFiles('rust-toolchain.toml') != ''
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt,clippy --target aarch64-unknown-linux-gnu
          rustup default 1.97.1
          rustc -vV

      - name: Configure Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: operations/ci/requirements-v0.txt

      - name: Install pinned readiness dependencies
        run: python -m pip install -r operations/ci/requirements-v0.txt

      - name: Validate V1 readiness source
        run: python operations/bin/validate_readiness_v1.py

      - name: Validate bounded local container preflight source
        run: |
          python containers/local/validate_local_stack.py
          sudo --non-interactive "$(command -v python)" -B -m unittest containers.local.tests.test_local_stack -v

      - name: Validate exact source provenance contracts
        run: python -m unittest scripts.operations.tests.test_verify_ci_provenance -v

      - name: Validate load harness JavaScript
        run: |
          node --check tests/load/v1-floor.js
          node --check tests/load/reconnect-storm-v1.js

      - name: Run V1 readiness contract tests
        run: |
          python -m unittest discover -s tests/live -p 'test_*.py' -v
          python -m unittest discover -s tests/recovery -p 'test_*.py' -v
          python -m unittest discover -s tests/resilience -p 'test_*.py' -v

      - name: Validate workflow safety
        run: python scripts/operations/validate_ci_workflows.py

      - name: Scan tracked source for secrets
        run: python scripts/operations/scan_repository_secrets.py

      - name: Collect owner-attributed source checkpoint
        if: always()
        run: >-
          python operations/bin/run_provider_gates_v1.py
          --stage source
          --release-id "$LIQI_RELEASE_ID"
          --output .artifacts/v1/checkpoints/source.json
          --evidence-dir .artifacts/v1/provider-gates

      - name: Upload source checkpoint
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: v1-source-checkpoint-${{ env.LIQI_EXPECTED_SOURCE_SHA }}
          path: |
            .artifacts/v1/checkpoints/source.json
            .artifacts/v1/provider-gates/**
            .artifacts/v1/provenance/source.json
          if-no-files-found: error
          retention-days: 14

  integration:
    name: Disposable PostgreSQL provider integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17.10-bookworm@sha256:4f736ae292687621d4dbe0d499ffd024a36bd2ee7d8ca6f2ccd4c800f047b394
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: liqi_v1_ci
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d liqi_v1_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      LIQI_TEST_DATABASE_URL: postgres://postgres@127.0.0.1:5432/liqi_v1_ci
      LIQI_TEST_DATABASE: liqi_v1_test_ci_provider
      LIQI_V0_UPGRADE_DATABASE: liqi_v0_upgrade_test_ci_provider
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: postgres
      PGDATABASE: postgres
      LIQI_FUZZ_SECONDS: "300"
    steps:
      - name: Checkout exact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.LIQI_EXPECTED_SOURCE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact source provenance
        run: >-
          python scripts/operations/verify_ci_provenance.py
          --job integration
          --expected-sha "$LIQI_EXPECTED_SOURCE_SHA"
          --release-id "$LIQI_RELEASE_ID"
          --output .artifacts/v1/provenance/integration.json

      - name: Install pinned pgTAP in disposable PostgreSQL service
        run: |
          set -euo pipefail
          container_id="$(docker ps --filter "publish=5432" --format '{{.ID}}' | head -n 1)"
          [[ -n "$container_id" ]]
          docker exec --user root "$container_id" bash -lc '
            set -euo pipefail
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              postgresql-17-pgtap=1.3.4-1.pgdg12+1
            test -f /usr/share/postgresql/17/extension/pgtap.control
            rm -rf /var/lib/apt/lists/*
          '
          docker exec --user root "$container_id" install -d -m 0755 /tmp/liqi-pgtap
          docker cp "$GITHUB_WORKSPACE/database/tests/pgtap/." "$container_id:/tmp/liqi-pgtap/"
          chmod 0755 "$GITHUB_WORKSPACE/database/tests/integration/bin/pg_prove"
          echo "LIQI_PGTAP_CONTAINER_ID=$container_id" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/database/tests/integration/bin" >> "$GITHUB_PATH"

      - name: Configure BEAM toolchain when provider is integrated
        if: hashFiles('.tool-versions') != ''
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Fetch BEAM dependencies when provider is integrated
        if: hashFiles('mix.exs') != ''
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Configure Rust toolchain when provider is integrated
        if: hashFiles('rust-toolchain.toml') != ''
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt,clippy --target aarch64-unknown-linux-gnu
          rustup default 1.97.1
          rustup toolchain install "$LIQI_FUZZ_TOOLCHAIN" --profile minimal
          cargo +1.97.1 install cargo-fuzz --version "$CARGO_FUZZ_VERSION" --locked
          rustc -vV
          cargo +"$LIQI_FUZZ_TOOLCHAIN" fuzz --help >/dev/null

      - name: Configure Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: operations/ci/requirements-v0.txt

      - name: Install pinned readiness dependencies
        run: python -m pip install -r operations/ci/requirements-v0.txt

      - name: Collect owner-attributed integration checkpoint
        run: >-
          python operations/bin/run_provider_gates_v1.py
          --stage integration
          --release-id "$LIQI_RELEASE_ID"
          --output .artifacts/v1/checkpoints/integration.json
          --evidence-dir .artifacts/v1/provider-gates
          --allow-build
          --allow-disposable-database
          --allow-blocked

      - name: Upload integration checkpoint
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: v1-integration-checkpoint-${{ env.LIQI_EXPECTED_SOURCE_SHA }}
          path: |
            .artifacts/v1/checkpoints/integration.json
            .artifacts/v1/provider-gates/**
            .artifacts/v1/provenance/integration.json
          if-no-files-found: error
          retention-days: 14

  artifact:
    name: Release and native artifact provider gates
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - name: Checkout exact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.LIQI_EXPECTED_SOURCE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact source provenance
        run: >-
          python scripts/operations/verify_ci_provenance.py
          --job artifact
          --expected-sha "$LIQI_EXPECTED_SOURCE_SHA"
          --release-id "$LIQI_RELEASE_ID"
          --output .artifacts/v1/provenance/artifact.json

      - name: Configure BEAM toolchain when provider is integrated
        if: hashFiles('.tool-versions') != ''
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Fetch BEAM dependencies when provider is integrated
        if: hashFiles('mix.exs') != ''
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Configure Rust toolchain when provider is integrated
        if: hashFiles('rust-toolchain.toml') != ''
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt,clippy --target aarch64-unknown-linux-gnu
          rustup default 1.97.1
          rustc -vV

      - name: Configure Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: operations/ci/requirements-v0.txt

      - name: Install pinned readiness dependencies
        run: python -m pip install -r operations/ci/requirements-v0.txt

      - name: Collect owner-attributed artifact checkpoint
        run: >-
          python operations/bin/run_provider_gates_v1.py
          --stage artifact
          --release-id "$LIQI_RELEASE_ID"
          --output .artifacts/v1/checkpoints/artifact.json
          --evidence-dir .artifacts/v1/provider-gates
          --allow-build
          --allow-blocked

      - name: Upload artifact checkpoint
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: v1-artifact-checkpoint-${{ env.LIQI_EXPECTED_SOURCE_SHA }}
          path: |
            .artifacts/v1/checkpoints/artifact.json
            .artifacts/v1/provider-gates/**
            .artifacts/v1/provenance/artifact.json
          if-no-files-found: error
          retention-days: 30
