name: V1 Temporary E5 Artifact Publication

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Stable lowercase release ID bound to this exact Git SHA
        required: true
        type: string
      deployment_mode:
        description: First production release or V1-to-V1 upgrade
        required: true
        default: first-release
        type: choice
        options:
          - first-release
          - upgrade
      rollback_target_release_id:
        description: Required only for upgrade; must name the retained V1 release
        required: false
        default: ""
        type: string
      authorization_reference:
        description: Non-secret approval reference for offline native authorization
        required: true
        type: string
      fuzz_seconds:
        description: Bounded native fuzz duration
        required: true
        default: "300"
        type: string

concurrency:
  group: v1-e5-artifact-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  LIQI_FUZZ_TOOLCHAIN: nightly-2026-07-01
  CARGO_FUZZ_VERSION: "0.13.2"
  COSIGN_VERSION: "3.1.2"
  COSIGN_SHA256: f7622ed3cf22e55e1ae6377c080979ff77a22da9981c11df222a2e444991e7cf

jobs:
  publish:
    name: Build and sign exact-SHA x86_64 release
    runs-on: ubuntu-24.04
    container:
      image: oraclelinux:9@sha256:24b2d51e33d781a48b380fc409146d13c5249113518297e8292c7f3aefa11212
      options: --user 0
    defaults:
      run:
        shell: bash
    timeout-minutes: 180
    environment: v1-e5-artifact-production
    env:
      NATIVE_DEPLOYMENT_KEY_ID: ${{ vars.LIQI_NATIVE_DEPLOYMENT_KEY_ID }}
      RELEASE_ARTIFACT_KEY_ID: ${{ vars.LIQI_RELEASE_ARTIFACT_KEY_ID }}
      RELEASE_MANIFEST_KEY_ID: ${{ vars.LIQI_RELEASE_MANIFEST_KEY_ID }}
    steps:
      - name: Bootstrap pinned Oracle Linux 9 build container
        run: |
          set -euo pipefail
          grep -q '^PLATFORM_ID="platform:el9"$' /etc/os-release
          dnf -y install ca-certificates git gzip tar
          dnf clean all

      - name: Checkout exact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Trust exact container workspace
        run: |
          set -euo pipefail
          [[ -n "$GITHUB_WORKSPACE" && "$GITHUB_WORKSPACE" == /__w/*/* ]]
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          [[ "$(git config --global --get-all safe.directory | tail -n 1)" == "$GITHUB_WORKSPACE" ]]

      - name: Validate protected inputs and exact source
        env:
          RELEASE_ID: ${{ inputs.release_id }}
          DEPLOYMENT_MODE: ${{ inputs.deployment_mode }}
          ROLLBACK_ID: ${{ inputs.rollback_target_release_id }}
          AUTHORIZATION_REFERENCE: ${{ inputs.authorization_reference }}
          FUZZ_SECONDS: ${{ inputs.fuzz_seconds }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_ID" =~ ^liqi-v1-[a-z0-9][a-z0-9._-]{2,95}$ ]]
          case "$DEPLOYMENT_MODE" in
            first-release) [[ -z "$ROLLBACK_ID" ]] ;;
            upgrade)
              [[ "$ROLLBACK_ID" =~ ^liqi-v1-[a-z0-9][a-z0-9._-]{2,95}$ ]]
              [[ "$ROLLBACK_ID" != "$RELEASE_ID" ]]
              ;;
            *) exit 64 ;;
          esac
          [[ ${#AUTHORIZATION_REFERENCE} -ge 3 && ${#AUTHORIZATION_REFERENCE} -le 256 ]]
          [[ "$FUZZ_SECONDS" =~ ^[0-9]+$ ]] && (( FUZZ_SECONDS >= 300 && FUZZ_SECONDS <= 3600 ))
          [[ -z "$(git status --porcelain --untracked-files=all)" ]]
          [[ "$(git rev-parse HEAD)" == "$GITHUB_SHA" ]]
          [[ "$NATIVE_DEPLOYMENT_KEY_ID" =~ ^[a-z0-9][a-z0-9._-]{2,63}$ ]]
          [[ "$RELEASE_ARTIFACT_KEY_ID" =~ ^[a-z0-9][a-z0-9._-]{2,63}$ ]]
          [[ "$RELEASE_MANIFEST_KEY_ID" =~ ^[a-z0-9][a-z0-9._-]{2,63}$ ]]
          [[ "$NATIVE_DEPLOYMENT_KEY_ID" != "$RELEASE_ARTIFACT_KEY_ID" ]]
          [[ "$NATIVE_DEPLOYMENT_KEY_ID" != "$RELEASE_MANIFEST_KEY_ID" ]]
          [[ "$RELEASE_ARTIFACT_KEY_ID" != "$RELEASE_MANIFEST_KEY_ID" ]]

      - name: Configure BEAM toolchain
        run: |
          set -euo pipefail
          bash scripts/release/install_ol9_beam_toolchain.sh

      - name: Configure Python
        run: |
          set -euo pipefail
          ln -sfn /usr/bin/python3.11 /usr/local/bin/python
          ln -sfn /usr/bin/pip3.11 /usr/local/bin/pip
          python --version

      - name: Install pinned build and validation dependencies
        run: |
          set -euo pipefail
          python -m pip install -r operations/ci/requirements-v0.txt
          install -d -m 0755 "$RUNNER_TEMP/rustup" "$RUNNER_TEMP/cargo"
          export RUSTUP_HOME="$RUNNER_TEMP/rustup"
          export CARGO_HOME="$RUNNER_TEMP/cargo"
          readonly RUSTUP_VERSION=1.28.2
          readonly RUSTUP_INIT_SHA256=20a06e644b0d9bd2fbdbfd52d42540bdde820ea7df86e92e533c073da0cdd43c
          readonly RUSTUP_INIT_URL="https://static.rust-lang.org/rustup/archive/${RUSTUP_VERSION}/x86_64-unknown-linux-gnu/rustup-init"
          curl --proto '=https' --tlsv1.2 --fail --location --retry 4 --silent --show-error \
            "$RUSTUP_INIT_URL" \
            --output "$RUNNER_TEMP/rustup-init"
          printf '%s  %s\n' "$RUSTUP_INIT_SHA256" "$RUNNER_TEMP/rustup-init" | sha256sum --check --strict
          chmod 0755 "$RUNNER_TEMP/rustup-init"
          "$RUNNER_TEMP/rustup-init" -y --no-modify-path --profile minimal --default-toolchain none
          printf 'RUSTUP_HOME=%s\nCARGO_HOME=%s\n' "$RUSTUP_HOME" "$CARGO_HOME" >> "$GITHUB_ENV"
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
          export PATH="$CARGO_HOME/bin:$PATH"
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt,clippy --target x86_64-unknown-linux-gnu
          rustup target add --toolchain 1.97.1 aarch64-unknown-linux-gnu
          rustup default 1.97.1
          rustup toolchain install "$LIQI_FUZZ_TOOLCHAIN" --profile minimal
          cargo +1.97.1 install cargo-fuzz --version "$CARGO_FUZZ_VERSION" --locked
          rustc +1.97.1 -vV
          cargo +"$LIQI_FUZZ_TOOLCHAIN" fuzz --help >/dev/null

      - name: Verify pinned Rust toolchain persistence
        run: |
          set -euo pipefail
          [[ "$RUSTUP_HOME" == "$RUNNER_TEMP/rustup" ]]
          [[ "$CARGO_HOME" == "$RUNNER_TEMP/cargo" ]]
          rustup target list --installed --toolchain 1.97.1 | grep -Fx 'aarch64-unknown-linux-gnu'
          rustup component list --installed --toolchain 1.97.1 | grep -E '^rustfmt-.* \(installed\)$'
          rustup component list --installed --toolchain 1.97.1 | grep -E '^clippy-.* \(installed\)$'
          cargo +1.97.1 --version

      - name: Install checksum-pinned cosign
        run: |
          set -euo pipefail
          install -d -m 0700 "$RUNNER_TEMP/liqi-tools"
          curl --proto '=https' --tlsv1.2 --fail --location --retry 4 --silent --show-error \
            "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign-linux-amd64" \
            --output "$RUNNER_TEMP/liqi-tools/cosign"
          printf '%s  %s\n' "$COSIGN_SHA256" "$RUNNER_TEMP/liqi-tools/cosign" | sha256sum --check --strict
          chmod 0755 "$RUNNER_TEMP/liqi-tools/cosign"
          echo "$RUNNER_TEMP/liqi-tools" >> "$GITHUB_PATH"

      - name: Materialize protected signing keys
        env:
          NATIVE_PRIVATE_KEY: ${{ secrets.LIQI_NATIVE_DEPLOYMENT_ED25519_PRIVATE_KEY }}
          ARTIFACT_PRIVATE_KEY: ${{ secrets.LIQI_RELEASE_ARTIFACT_ED25519_PRIVATE_KEY }}
          MANIFEST_PRIVATE_KEY: ${{ secrets.LIQI_RELEASE_MANIFEST_ED25519_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          umask 077
          key_root="$RUNNER_TEMP/liqi-signing-private"
          trust_root="$RUNNER_TEMP/liqi-public-trust"
          install -d -m 0700 "$key_root" "$trust_root/native" "$trust_root/release"
          [[ -n "$NATIVE_PRIVATE_KEY" && -n "$ARTIFACT_PRIVATE_KEY" && -n "$MANIFEST_PRIVATE_KEY" ]]
          printf '%s\n' "$NATIVE_PRIVATE_KEY" > "$key_root/native.pem"
          printf '%s\n' "$ARTIFACT_PRIVATE_KEY" > "$key_root/release-artifact.pem"
          printf '%s\n' "$MANIFEST_PRIVATE_KEY" > "$key_root/release-manifest.pem"
          openssl pkey -in "$key_root/native.pem" -pubout -out "$trust_root/native/${NATIVE_DEPLOYMENT_KEY_ID}.pem"
          openssl pkey -in "$key_root/release-artifact.pem" -pubout -out "$trust_root/release/${RELEASE_ARTIFACT_KEY_ID}.pem"
          openssl pkey -in "$key_root/release-manifest.pem" -pubout -out "$trust_root/release/${RELEASE_MANIFEST_KEY_ID}.pem"
          native_fp=$(sha256sum "$trust_root/native/${NATIVE_DEPLOYMENT_KEY_ID}.pem" | cut -d' ' -f1)
          artifact_fp=$(sha256sum "$trust_root/release/${RELEASE_ARTIFACT_KEY_ID}.pem" | cut -d' ' -f1)
          manifest_fp=$(sha256sum "$trust_root/release/${RELEASE_MANIFEST_KEY_ID}.pem" | cut -d' ' -f1)
          [[ "$native_fp" != "$artifact_fp" && "$native_fp" != "$manifest_fp" && "$artifact_fp" != "$manifest_fp" ]]

      - name: Validate workflow and repository safety
        run: |
          set -euo pipefail
          python scripts/operations/validate_ci_workflows.py
          python scripts/operations/scan_repository_secrets.py
          mix format --check-formatted

      - name: Run exact-SHA native safety gates
        id: native_safety
        env:
          LIQI_FUZZ_SECONDS: ${{ inputs.fuzz_seconds }}
        run: |
          set -euo pipefail
          python native/scripts/run_v1_safety_gates.py --output .artifacts/e5/native-safety-result-v1.json

      - name: Upload native safety evidence
        if: ${{ always() && steps.native_safety.outcome != 'skipped' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: liqi-v1-e5-native-safety-${{ github.sha }}-${{ github.run_attempt }}
          path: .artifacts/e5/**
          if-no-files-found: error
          retention-days: 30

      - name: Build exact x86_64 native artifact
        env:
          RELEASE_ID: ${{ inputs.release_id }}
        run: |
          set -euo pipefail
          native_dir="$RUNNER_TEMP/liqi-native-output"
          test ! -e "$native_dir"
          LIQI_RELEASE_ID="$RELEASE_ID" \
          LIQI_SOURCE_REVISION="$GITHUB_SHA" \
          LIQI_NATIVE_BUILD_JOBS=2 \
          LIQI_NATIVE_OUTPUT_DIR="$native_dir" \
            bash native/scripts/build-x86_64-artifact.sh

      - name: Keyless-sign and package native provenance
        env:
          RELEASE_ID: ${{ inputs.release_id }}
        run: |
          set -euo pipefail
          native_dir="$RUNNER_TEMP/liqi-native-output"
          identity="${GITHUB_SERVER_URL}/${GITHUB_WORKFLOW_REF}"
          cosign sign-blob --yes \
            --bundle "$native_dir/libliqi_sequence_diff_nif.so.sigstore.json" \
            "$native_dir/libliqi_sequence_diff_nif.so"
          python native/scripts/package_artifact.py \
            --artifact-dir "$native_dir" \
            --release-id "$RELEASE_ID" \
            --source-revision "$GITHUB_SHA" \
            --builder-id "$identity" \
            --signature-identity "$identity" \
            --signature-issuer 'https://token.actions.githubusercontent.com' \
            --target-triple x86_64-unknown-linux-gnu
          python native/scripts/verify_artifact.py \
            --manifest "$native_dir/native-artifact-${RELEASE_ID}.json"

      - name: Authorize exact native bytes for offline installation
        env:
          RELEASE_ID: ${{ inputs.release_id }}
          AUTHORIZATION_REFERENCE: ${{ inputs.authorization_reference }}
        run: |
          set -euo pipefail
          native_dir="$RUNNER_TEMP/liqi-native-output"
          python infrastructure/deployment/authorize_native_artifact.py \
            --native-manifest "$native_dir/native-artifact-${RELEASE_ID}.json" \
            --deployment-key-id "$NATIVE_DEPLOYMENT_KEY_ID" \
            --deployment-signing-key "$RUNNER_TEMP/liqi-signing-private/native.pem" \
            --authorization-reference "$AUTHORIZATION_REFERENCE" \
            --output-dir "$native_dir" \
            --output-result "$native_dir/native-authorization-result-v1.json"

      - name: Build and self-verify signed Mix release
        env:
          RELEASE_ID: ${{ inputs.release_id }}
          DEPLOYMENT_MODE: ${{ inputs.deployment_mode }}
          ROLLBACK_ID: ${{ inputs.rollback_target_release_id }}
        run: |
          set -euo pipefail
          native_dir="$RUNNER_TEMP/liqi-native-output"
          release_dir="$RUNNER_TEMP/liqi-release-output"
          transition_args=()
          if [[ "$DEPLOYMENT_MODE" == first-release ]]; then
            transition_args+=(--first-release)
          else
            transition_args+=(--rollback-target-release-id "$ROLLBACK_ID")
          fi
          python beam/scripts/build_linux_release.py \
            --release-id "$RELEASE_ID" \
            --target-triple x86_64-unknown-linux-gnu \
            --native-provider-manifest "$native_dir/native-artifact-${RELEASE_ID}.json" \
            --native-deployment-manifest "$native_dir/native-deployment-${RELEASE_ID}.json" \
            --native-trust-dir "$RUNNER_TEMP/liqi-public-trust/native" \
            --artifact-key-id "$RELEASE_ARTIFACT_KEY_ID" \
            --artifact-signing-key "$RUNNER_TEMP/liqi-signing-private/release-artifact.pem" \
            --manifest-key-id "$RELEASE_MANIFEST_KEY_ID" \
            --manifest-signing-key "$RUNNER_TEMP/liqi-signing-private/release-manifest.pem" \
            "${transition_args[@]}" \
            --output-dir "$release_dir" \
            --build-jobs 2
          python beam/scripts/validate_linux_release_build_result.py \
            --result "$release_dir/${RELEASE_ID}.linux-release-build-result-v1.json" \
            --git-sha "$GITHUB_SHA" \
            --target-triple x86_64-unknown-linux-gnu \
            --release-trust-dir "$RUNNER_TEMP/liqi-public-trust/release" \
            --native-trust-dir "$RUNNER_TEMP/liqi-public-trust/native"

      - name: Assemble public publication package
        run: |
          set -euo pipefail
          publication="$RUNNER_TEMP/liqi-e5-publication"
          install -d -m 0750 "$publication/native" "$publication/release" "$publication/trust/native" "$publication/trust/release" "$publication/evidence"
          cp -a "$RUNNER_TEMP/liqi-native-output/." "$publication/native/"
          cp -a "$RUNNER_TEMP/liqi-release-output/." "$publication/release/"
          cp -a "$RUNNER_TEMP/liqi-public-trust/native/." "$publication/trust/native/"
          cp -a "$RUNNER_TEMP/liqi-public-trust/release/." "$publication/trust/release/"
          cp -a .artifacts/e5/. "$publication/evidence/"
          if grep -R -E --binary-files=without-match 'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY' "$publication"; then
            echo 'private key material detected in publication package' >&2
            exit 1
          fi
          (
            cd "$publication"
            find . -type f ! -name SHA256SUMS -print0 \
              | LC_ALL=C sort -z \
              | xargs -0 sha256sum > SHA256SUMS
            sha256sum --check --strict SHA256SUMS
          )

      - name: Upload signed E5 publication
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: liqi-v1-e5-publication-${{ github.sha }}
          path: ${{ runner.temp }}/liqi-e5-publication
          if-no-files-found: error
          retention-days: 30

      - name: Remove private signing material
        if: always()
        run: |
          rm -rf "$RUNNER_TEMP/liqi-signing-private"
