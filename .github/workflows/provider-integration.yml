name: V0 Provider Integration Gate

on:
  workflow_dispatch:
    inputs:
      stage:
        description: Integration is pre-release; promotion additionally requires recovery and platform-probe evidence.
        required: true
        type: choice
        options:
          - integration
          - promotion
      environment:
        description: Evidence environment classification; this workflow performs no deployment.
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      allow_disposable_database:
        description: Permit only provider-owned tests against an explicitly disposable database.
        required: true
        type: boolean
        default: false

concurrency:
  group: v0-provider-${{ inputs.environment }}-${{ inputs.stage }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  provider-gates:
    name: Strict provider contract integration
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout exact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: operations/ci/requirements-v0.txt

      - name: Install pinned control-plane dependencies
        run: python -m pip install -r operations/ci/requirements-v0.txt

      - name: Validate registry and operations contracts
        run: |
          python scripts/operations/validate_contracts.py
          python scripts/operations/validate_provider_registry.py --allow-pending

      - name: Run strict provider gates without mock fallback
        env:
          LIQI_TEST_DATABASE: liqi_v0_ci
        run: |
          args=(
            --stage "${{ inputs.stage }}"
            --environment "${{ inputs.environment }}"
            --output .artifacts/provider-integration-result.json
          )
          if [[ "${{ inputs.allow_disposable_database }}" == "true" ]]; then
            args+=(--allow-disposable-database)
          fi
          python scripts/operations/run_provider_gates.py "${args[@]}"

      - name: Upload integration evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: provider-integration-result-${{ github.sha }}-${{ inputs.stage }}
          path: .artifacts/provider-integration-result.json
          if-no-files-found: error
          retention-days: 30
