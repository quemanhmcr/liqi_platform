name: V0 Provider Integration Gate

on:
  workflow_dispatch:
    inputs:
      stage:
        description: Integration is pre-release; promotion additionally requires recovery and platform-probe evidence.
        required: true
        type: choice
        options:
          - integration
          - promotion
      environment:
        description: Evidence environment classification; this workflow performs no deployment.
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      allow_disposable_database:
        description: Permit only provider-owned tests against an explicitly disposable database.
        required: true
        type: boolean
        default: false
      oci_plan_run_id:
        description: Required for promotion; workflow run ID containing the reviewed oci-plan-json artifact.
        required: false
        type: string
        default: ""
      oci_plan_artifact_name:
        description: Artifact containing a single oci-plan.json produced by tofu show -json.
        required: false
        type: string
        default: "oci-plan-json"

concurrency:
  group: v0-provider-${{ inputs.environment }}-${{ inputs.stage }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  provider-gates:
    name: Strict provider contract integration
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout exact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: operations/ci/requirements-v0.txt

      - name: Install pinned control-plane dependencies
        run: python -m pip install -r operations/ci/requirements-v0.txt

      - name: Install pinned OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f
        with:
          tofu_version: "1.12.1"
          tofu_wrapper: false
          cache: true

      - name: Require reviewed OCI plan artifact for promotion
        if: inputs.stage == 'promotion' && inputs.oci_plan_run_id == ''
        run: |
          echo "::error title=OCI plan evidence missing::Promotion requires oci_plan_run_id for a reviewed tofu show -json artifact."
          exit 2

      - name: Download reviewed OCI plan artifact
        if: inputs.stage == 'promotion' && inputs.oci_plan_run_id != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ${{ inputs.oci_plan_artifact_name }}
          path: .artifacts/oci-plan
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.oci_plan_run_id }}

      - name: Validate reviewed OCI plan artifact shape
        if: inputs.stage == 'promotion'
        run: |
          test -f .artifacts/oci-plan/oci-plan.json
          test "$(find .artifacts/oci-plan -type f | wc -l)" -eq 1

      - name: Validate registry and operations contracts
        run: |
          python scripts/operations/validate_contracts.py
          python scripts/operations/validate_provider_registry.py --allow-pending
          python scripts/operations/validate_telemetry_runtime.py

      - name: Validate cross-provider compatibility strictly
        run: >-
          python scripts/operations/validate_provider_compatibility.py
          --output .artifacts/provider-compatibility-result.json

      - name: Aggregate provider capacity strictly
        run: >-
          python scripts/operations/collect_provider_capacity.py
          --output .artifacts/provider-capacity-result.json

      - name: Run strict provider gates without mock fallback
        env:
          LIQI_TEST_DATABASE: liqi_v0_ci
          LIQI_OCI_PLAN_JSON: ${{ github.workspace }}/.artifacts/oci-plan/oci-plan.json
        run: |
          args=(
            --stage "${{ inputs.stage }}"
            --environment "${{ inputs.environment }}"
            --output .artifacts/provider-integration-result.json
          )
          if [[ "${{ inputs.allow_disposable_database }}" == "true" ]]; then
            args+=(--allow-disposable-database)
          fi
          python scripts/operations/run_provider_gates.py "${args[@]}"

      - name: Upload integration evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: provider-integration-result-${{ github.sha }}-${{ inputs.stage }}
          path: |
            .artifacts/provider-integration-result.json
            .artifacts/provider-compatibility-result.json
            .artifacts/provider-capacity-result.json
          if-no-files-found: error
          retention-days: 30
