name: V0 Source Control Plane

on:
  pull_request:
  push:
    branches:
      - main
      - "v0/**"

concurrency:
  group: v0-source-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  operations-contracts:
    name: Operations contracts and controls
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: operations/ci/requirements-v0.txt

      - name: Install pinned control-plane dependencies
        run: python -m pip install -r operations/ci/requirements-v0.txt

      - name: Install pinned OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f
        with:
          tofu_version: "1.12.1"
          tofu_wrapper: false
          cache: true

      - name: Validate operations contracts
        run: python scripts/operations/validate_contracts.py

      - name: Validate provider invocation registry
        run: python scripts/operations/validate_provider_registry.py --allow-pending

      - name: Validate dependency and license policy
        run: python scripts/operations/validate_dependency_policy.py

      - name: Validate SLO, alerts and runbooks
        run: python scripts/operations/validate_operability_catalog.py

      - name: Validate telemetry runtime policy
        run: python scripts/operations/validate_telemetry_runtime.py

      - name: Validate cross-provider compatibility
        continue-on-error: true
        run: >-
          python scripts/operations/validate_provider_compatibility.py
          --output .artifacts/provider-compatibility-result.json
          --allow-missing

      - name: Collect provider capacity budgets
        continue-on-error: true
        run: >-
          python scripts/operations/collect_provider_capacity.py
          --output .artifacts/provider-capacity-result.json
          --allow-blocked

      - name: Validate workflow safety
        run: python scripts/operations/validate_ci_workflows.py

      - name: Run Senior 4 source tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Invoke published provider source gates
        continue-on-error: true
        run: >-
          python scripts/operations/run_provider_gates.py
          --stage source
          --environment development
          --output .artifacts/provider-source-result.json
          --allow-blocked

      - name: Assemble source integration readiness
        if: always()
        run: >-
          python scripts/operations/assemble_source_readiness.py
          --provider-result .artifacts/provider-source-result.json
          --compatibility-result .artifacts/provider-compatibility-result.json
          --capacity-result .artifacts/provider-capacity-result.json
          --output .artifacts/source-integration-readiness-v0.json
          --allow-blocked

      - name: Upload provider source result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: provider-source-result-${{ github.sha }}
          path: |
            .artifacts/provider-source-result.json
            .artifacts/provider-compatibility-result.json
            .artifacts/provider-capacity-result.json
            .artifacts/source-integration-readiness-v0.json
          if-no-files-found: error
          retention-days: 14

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run tracked-source secret gate
        run: python scripts/operations/scan_repository_secrets.py

      - name: Run pinned gitleaks history gate
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rust-supply-chain:
    name: Rust dependency policy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect provider Cargo workspace
        id: cargo-workspace
        shell: bash
        run: |
          if [[ -f Cargo.toml && -f Cargo.lock && -f rust-toolchain.toml ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Senior 3 Cargo workspace is not yet published; Rust policy gate is blocked, not emulated."
          fi

      - name: RustSec advisory gate
        if: steps.cargo-workspace.outputs.available == 'true'
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cargo deny license, source and ban gate
        if: steps.cargo-workspace.outputs.available == 'true'
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25
        with:
          command: check
          arguments: --all-features --config operations/release/cargo-deny-v0.toml
          command-arguments: advisories bans licenses sources
          manifest-path: ./Cargo.toml
          log-level: warn

      - name: Report unpublished Rust provider seam
        if: steps.cargo-workspace.outputs.available != 'true'
        run: |
          echo "::notice title=Provider gate blocked::Owner Senior 3; seam root Cargo workspace; action publish Cargo.toml, Cargo.lock and rust-toolchain.toml."
