name: V1 Protected Live Readiness

on:
  workflow_dispatch:
    inputs:
      stage:
        description: Read-only/approved-evidence checkpoint to evaluate.
        required: true
        type: choice
        options:
          - live-staging
          - promotion
          - cutover
          - post-cutover
      environment:
        description: Protected GitHub environment containing endpoint variables and read-only probe credentials.
        required: true
        type: choice
        options:
          - staging
          - production
      release_id:
        description: Exact V1 release ID already built or activated by the owning provider.
        required: true
        type: string
      evidence_run_id:
        description: Required for post-cutover; prior run containing the canonical v1-readiness-bundle artifact.
        required: false
        type: string
        default: ""
      evidence_artifact_name:
        description: Canonical exact-release evidence bundle artifact name.
        required: true
        type: string
        default: v1-readiness-bundle
      allow_isolated_restore:
        description: Permit the provider-owned isolated restore command only with protected-environment approval and a non-empty approval reference.
        required: true
        type: boolean
        default: false
      restore_approval_ref:
        description: Approval reference for an isolated restore target; never authorizes restoring over live.
        required: false
        type: string
        default: ""

concurrency:
  group: v1-live-${{ inputs.environment }}-${{ inputs.stage }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  protected-checkpoint:
    name: Protected ${{ inputs.stage }} checkpoint
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: v1-${{ inputs.environment }}
    steps:
      - name: Checkout exact source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: operations/ci/requirements-v0.txt

      - name: Install pinned readiness dependencies
        run: python -m pip install -r operations/ci/requirements-v0.txt

      - name: Validate protected inputs
        shell: bash
        run: |
          [[ "${{ inputs.release_id }}" =~ ^liqi-v1-[a-z0-9][a-z0-9._-]{2,95}$ ]]
          if [[ "${{ inputs.stage }}" == "cutover" || "${{ inputs.stage }}" == "post-cutover" ]]; then
            [[ "${{ inputs.environment }}" == "production" ]]
          fi
          if [[ "${{ inputs.stage }}" == "post-cutover" ]]; then
            [[ -n "${{ inputs.evidence_run_id }}" ]]
          fi
          if [[ "${{ inputs.allow_isolated_restore }}" == "true" ]]; then
            [[ -n "${{ inputs.restore_approval_ref }}" ]]
          fi

      - name: Download canonical prior evidence bundle
        if: inputs.evidence_run_id != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ${{ inputs.evidence_artifact_name }}
          path: .artifacts/v1/input
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.evidence_run_id }}

      - name: Run strict provider checkpoint
        shell: bash
        env:
          LIQI_BASE_URL: ${{ vars.LIQI_BASE_URL }}
          LIQI_READINESS_AUTH_TOKEN: ${{ secrets.LIQI_READINESS_AUTH_TOKEN }}
          LIQI_RELEASE_ID: ${{ inputs.release_id }}
          LIQI_RELEASE_MANIFEST: ${{ vars.LIQI_RELEASE_MANIFEST }}
          LIQI_NATIVE_MANIFEST: ${{ vars.LIQI_NATIVE_MANIFEST }}
          LIQI_OCI_PLAN_JSON: ${{ vars.LIQI_OCI_PLAN_JSON }}
          LIQI_RESTORE_APPROVAL_REF: ${{ inputs.restore_approval_ref }}
        run: |
          args=(
            --stage "${{ inputs.stage }}"
            --release-id "${{ inputs.release_id }}"
            --output ".artifacts/v1/checkpoints/${{ inputs.stage }}.json"
            --evidence-dir .artifacts/v1/provider-gates
            --allow-live-read-only
          )
          if [[ "${{ inputs.allow_isolated_restore }}" == "true" ]]; then
            args+=(--allow-isolated-restore --approval-ref "${{ inputs.restore_approval_ref }}")
          fi
          python operations/bin/run_provider_gates_v1.py "${args[@]}"

      - name: Compose strict post-cutover verdict
        if: inputs.stage == 'post-cutover'
        shell: bash
        run: |
          mkdir -p .artifacts/v1/input/checkpoints
          cp .artifacts/v1/checkpoints/post-cutover.json .artifacts/v1/input/checkpoints/post-cutover.json
          required=(
            evidence/capacity.json
            evidence/platform-probe.json
            evidence/load.json
            evidence/reconnect.json
            evidence/recovery.json
            evidence/resilience.json
            evidence/security.json
            evidence/cutover.json
            evidence/rollback.json
            checkpoints/source.json
            checkpoints/integration.json
            checkpoints/artifact.json
            checkpoints/live-staging.json
            checkpoints/promotion.json
            checkpoints/cutover.json
            checkpoints/post-cutover.json
            compatibility.json
            oci-mutations.json
          )
          for relative in "${required[@]}"; do
            test -f ".artifacts/v1/input/${relative}"
          done
          args=(
            --git-sha "$GITHUB_SHA"
            --release-id "${{ inputs.release_id }}"
            --environment production
            --compatibility .artifacts/v1/input/compatibility.json
            --oci-mutations .artifacts/v1/input/oci-mutations.json
            --output .artifacts/v1/v1-readiness-result.json
          )
          for kind in capacity platform-probe load reconnect recovery resilience security cutover rollback; do
            args+=(--evidence "${kind}=.artifacts/v1/input/evidence/${kind}.json")
          done
          for checkpoint in source integration artifact live-staging promotion cutover post-cutover; do
            args+=(--checkpoint "${checkpoint}=.artifacts/v1/input/checkpoints/${checkpoint}.json")
          done
          python operations/bin/compose_readiness_v1.py "${args[@]}"

      - name: Upload protected checkpoint evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: v1-${{ inputs.stage }}-${{ github.sha }}
          path: |
            .artifacts/v1/checkpoints/**
            .artifacts/v1/provider-gates/**
            .artifacts/v1/v1-readiness-result.json
          if-no-files-found: error
          retention-days: 30
